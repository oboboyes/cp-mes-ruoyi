version: '3.8'

services:
  # Django application
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: cp-mes-web-dev
    ports:
      - "8000:8000"
    environment:
      - DJANGO_ENV=development
      - DJANGO_SECRET_KEY=dev-secret-key-change-in-production
      - DB_NAME=cp_mes
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ..:/app
    networks:
      - cp-mes-network

  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: cp-mes-db-dev
    environment:
      - POSTGRES_DB=cp_mes
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cp-mes-network

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: cp-mes-redis-dev
    ports:
      - "6379:6379"
    networks:
      - cp-mes-network

  # Celery worker
  celery:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: cp-mes-celery-dev
    command: celery -A config worker -l info
    environment:
      - DJANGO_ENV=development
      - DJANGO_SECRET_KEY=dev-secret-key-change-in-production
      - DB_NAME=cp_mes
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ..:/app
    networks:
      - cp-mes-network

networks:
  cp-mes-network:
    driver: bridge

volumes:
  postgres_data_dev:
