version: '3.8'

services:
  # Django application
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cp-mes-web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DJANGO_ENV=production
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DB_NAME=cp_mes
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - cp-mes-network

  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: cp-mes-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=cp_mes
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cp-mes-network

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: cp-mes-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - cp-mes-network

  # Celery worker
  celery:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cp-mes-celery
    restart: unless-stopped
    command: celery -A config worker -l info
    environment:
      - DJANGO_ENV=production
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DB_NAME=cp_mes
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - cp-mes-network

  # Celery beat scheduler
  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cp-mes-celery-beat
    restart: unless-stopped
    command: celery -A config beat -l info
    environment:
      - DJANGO_ENV=production
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DB_NAME=cp_mes
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - cp-mes-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: cp-mes-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/static:ro
      - media_volume:/media:ro
    depends_on:
      - web
    networks:
      - cp-mes-network

networks:
  cp-mes-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
